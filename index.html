<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSI Inventory — Shree Sai Industries</title>
  <link rel="icon" type="image/png" href="assets/ssi-favicon.png" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- SheetJS (Excel) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- ✅ Firebase SDK — MUST be loaded FIRST before firebase.js -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; }

    /* Login */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a5f 0%, #0f2440 100%);
    }
    #login-screen.hidden { display: none !important; }

    /* App shell */
    #app-shell { display: none; height: 100vh; overflow: hidden; }
    #app-shell.visible { display: flex; }

    /* Sidebar */
    #sidebar {
      width: 240px;
      background: linear-gradient(180deg, #1e3a5f, #0f2440);
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
    }
    [data-nav].active {
      background: rgba(255,255,255,0.15);
      border-left: 3px solid #fff;
    }

    /* Main */
    #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #app-area { flex: 1; overflow-y: auto; padding: 1.5rem; }

    /* Table */
    .ssi-table { width: 100%; border-collapse: collapse; }
    .ssi-table th {
      background: #1e3a5f; color: #fff;
      padding: .6rem 1rem; text-align: left;
      font-size: .75rem; text-transform: uppercase; letter-spacing: .05em;
    }
    .ssi-table td {
      padding: .6rem 1rem; border-bottom: 1px solid #e2e8f0;
      font-size: .875rem; vertical-align: middle;
    }
    .ssi-table tr:hover td { background: #f8fafc; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; padding: 1rem;
    }
    .modal-box {
      background: #fff; border-radius: 1rem;
      width: 100%; max-width: 640px;
      max-height: 90vh; overflow-y: auto;
      padding: 1.5rem; box-shadow: 0 25px 50px rgba(0,0,0,.25);
    }

    /* Badges */
    .badge { padding: .2rem .7rem; border-radius: 999px; font-size: .75rem; font-weight: 600; }
    .badge-draft      { background:#e2e8f0; color:#475569; }
    .badge-submitted  { background:#fef3c7; color:#b45309; }
    .badge-dispatched { background:#d1fae5; color:#065f46; }
    .badge-cancelled  { background:#fee2e2; color:#991b1b; }
    .badge-low        { background:#fee2e2; color:#991b1b; }
    .badge-ok         { background:#d1fae5; color:#065f46; }

    /* Sync badge */
    #sync-badge {
      position: fixed; top: 8px; right: 12px;
      background: #22c55e; color: #fff;
      font-size: .7rem; padding: 3px 10px;
      border-radius: 999px; z-index: 999;
      opacity: 0; transition: opacity .4s;
      pointer-events: none;
    }
    #sync-badge.show { opacity: 1; }

    @media (max-width: 768px) {
      #sidebar { position: fixed; z-index: 40; transform: translateX(-100%); transition: transform .3s; }
      #sidebar.open { transform: translateX(0); }
    }
  </style>
</head>
<body>

<!-- Sync indicator -->
<div id="sync-badge">✅ Synced</div>

<!-- ═══════════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════════ -->
<div id="login-screen">
  <div style="background:#fff; border-radius:1.25rem; padding:2.5rem; width:100%; max-width:360px; box-shadow:0 25px 50px rgba(0,0,0,.3); text-align:center;">

    <img src="assets/ssi-logo.png" alt="SSI Logo"
         style="width:90px; height:90px; object-fit:contain; border-radius:.75rem; margin:0 auto 1rem; display:block; background:#f1f5f9; padding:4px;"
         onerror="this.style.display='none'" />

    <h1 style="font-size:1.5rem; font-weight:700; color:#1e3a5f; margin:0 0 .25rem;">Shree Sai Industries</h1>
    <p style="color:#64748b; font-size:.85rem; margin:0 0 1.5rem;">Inventory Management System</p>

    <div id="login-error"
         style="display:none; background:#fef2f2; border:1px solid #fca5a5; color:#dc2626; border-radius:.5rem; padding:.6rem 1rem; font-size:.85rem; margin-bottom:1rem;">
    </div>

    <input id="login-user" type="text" placeholder="Username" autocomplete="username"
           style="width:100%; border:1.5px solid #cbd5e1; border-radius:.6rem; padding:.7rem 1rem; font-size:.9rem; margin-bottom:.75rem; outline:none;"
           onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#cbd5e1'"
           onkeydown="if(event.key==='Enter') document.getElementById('login-pass').focus()" />

    <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password"
           style="width:100%; border:1.5px solid #cbd5e1; border-radius:.6rem; padding:.7rem 1rem; font-size:.9rem; margin-bottom:1.25rem; outline:none;"
           onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#cbd5e1'"
           onkeydown="if(event.key==='Enter') SSIAuth.login()" />

    <button onclick="SSIAuth.login()"
            style="width:100%; background:#1e40af; color:#fff; border:none; border-radius:.6rem; padding:.8rem; font-size:.95rem; font-weight:600; cursor:pointer;"
            onmouseover="this.style.background='#1e3a8a'" onmouseout="this.style.background='#1e40af'">
      Login
    </button>

    <p style="color:#94a3b8; font-size:.75rem; margin-top:1.5rem;">© 2025 Shree Sai Industries</p>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════ -->
<div id="app-shell">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div style="padding:1.25rem; display:flex; align-items:center; gap:.75rem; border-bottom:1px solid rgba(255,255,255,.1);">
      <img src="assets/ssi-logo.png" alt="SSI"
           style="width:40px; height:40px; object-fit:contain; border-radius:.5rem; background:#fff; padding:2px;"
           onerror="this.style.display='none'" />
      <div>
        <div style="font-weight:700; font-size:.9rem;">Shree Sai</div>
        <div style="font-size:.7rem; color:#93c5fd;">Inventory System</div>
      </div>
    </div>

    <nav id="sidebar-nav" style="flex:1; padding:.75rem .5rem;"></nav>

    <div style="padding:1rem; border-top:1px solid rgba(255,255,255,.1);">
      <div id="user-info" style="font-size:.75rem; color:#93c5fd; margin-bottom:.75rem;"></div>
      <button onclick="SSIAuth.logout()"
              style="width:100%; background:#dc2626; color:#fff; border:none; border-radius:.5rem; padding:.5rem; font-size:.8rem; cursor:pointer;">
        🚪 Logout
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div id="main-content">
    <!-- Top bar -->
    <div style="background:#fff; border-bottom:1px solid #e2e8f0; padding:.75rem 1.5rem; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; box-shadow:0 1px 3px rgba(0,0,0,.05);">
      <div style="display:flex; align-items:center; gap:.75rem;">
        <button class="md:hidden" onclick="document.getElementById('sidebar').classList.toggle('open')"
                style="background:none; border:none; font-size:1.25rem; cursor:pointer; color:#64748b;">☰</button>
        <span id="page-title" style="font-weight:600; color:#1e3a5f; font-size:.95rem;"></span>
      </div>
      <div style="display:flex; align-items:center; gap:.75rem;">
        <span id="top-user-name" style="font-size:.85rem; font-weight:600; color:#374151;"></span>
        <span id="top-user-role"
              style="background:#dbeafe; color:#1d4ed8; font-size:.7rem; padding:.2rem .6rem; border-radius:999px; font-weight:600;"></span>
      </div>
    </div>

    <!-- Page area -->
    <main id="app-area"></main>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     SCRIPTS — ORDER MATTERS!
     1. firebase.js (uses firebase global from CDN above)
     2. app.js
     3. all other modules
════════════════════════════════════════════ -->
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/products.js"></script>
<script src="js/clients.js"></script>
<script src="js/inventory.js"></script>
<script src="js/orders.js"></script>
<script src="js/dispatch.js"></script>
<script src="js/reports.js"></script>
<script src="js/users.js"></script>
<script src="js/units.js"></script>

</body>
</html>
